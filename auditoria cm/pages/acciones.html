<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>CM Colombia | Repositorio de Auditorías</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../magia/auth.js"></script>

  <style>
    body{ margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial; background:#f6fbf7; color:#122016; }
    .wrap{ max-width:1200px; margin:0 auto; padding:18px; }
    .card{ background:#fff; border:1px solid #dfeee3; border-radius:16px; padding:16px; box-shadow:0 10px 28px rgba(0,0,0,.06); }
    h1{ margin:0 0 6px 0; color:#2e7d32; font-size:34px; }
    .muted{ color:#6b7a6f; font-size:13px; }
    .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin:12px 0; }
    .topline{ display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; }
    input, select{ padding:10px 12px; border-radius:12px; border:1px solid #dfeee3; outline:none; background:#fff; font-size:14px; }
    input:focus, select:focus{ border-color:#7cc242; box-shadow:0 0 0 4px rgba(124,194,66,.18); }
    table{ width:100%; border-collapse:collapse; margin-top:10px; }
    th, td{ text-align:left; padding:12px 10px; border-bottom:1px solid #eef5f0; font-size:14px; vertical-align:top; }
    th{ font-size:12px; color:#5b6e61; text-transform:uppercase; letter-spacing:.6px; }
    .pill{ display:inline-block; padding:5px 10px; border-radius:999px; border:1px solid #dfeee3; font-size:12px; background:#fff; }
    .btn{ cursor:pointer; border:none; border-radius:999px; padding:10px 14px; font-weight:900; }
    .btn-primary{ background:linear-gradient(180deg,#7cc242,#2e7d32); color:#fff; }
    .btn-ghost{ background:#fff; border:1px solid #dfeee3; color:#2e7d32; }
    .btn-mini{ padding:8px 12px; font-size:12px; }
    .btn[disabled]{ opacity:.55; cursor:not-allowed; }
    .err{ color:#c62828; font-size:13px; min-height:18px; white-space:pre-wrap; }
    .pager{ display:flex; gap:8px; align-items:center; justify-content:flex-end; margin-top:12px; flex-wrap:wrap; }
    .spacer{ flex:1; }
    .cell-actions{ display:flex; gap:8px; align-items:center; justify-content:flex-end; flex-wrap:wrap; }
    .icon-btn{ width:40px; height:34px; display:inline-flex; align-items:center; justify-content:center; text-decoration:none; }
    .small{ font-size:12px; color:#6b7a6f; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="topline">
        <div>
          <h1>Repositorio de Auditorías</h1>
          <div class="muted">Aquí se ven auditorías con PDF generado.</div>
        </div>
        <div class="row">
          <button class="btn btn-ghost" id="btnBack" type="button">Volver</button>
          <button class="btn btn-ghost" id="btnLogout" type="button">Cerrar sesión</button>
        </div>
      </div>

      <div class="row">
        <input id="q" style="flex:1; min-width:240px;" placeholder="Buscar auditoría" />
        <button class="btn btn-primary" id="btnReload" type="button">Actualizar</button>
      </div>

      <div class="row">
        <div class="pill" id="count">—</div>
        <div class="spacer"></div>
        <div class="muted" id="who">—</div>
      </div>

      <div class="err" id="err"></div>

      <table>
        <thead>
          <tr>
            <th>Título</th>
            <th>Estado</th>
            <th>Usuario</th>
            <th>Fechas</th>
            <th>Creada</th>
            <th style="text-align:right;">Acciones</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="6" class="muted">Cargando...</td></tr>
        </tbody>
      </table>

      <div class="pager">
        <button class="btn btn-ghost" id="prev" type="button">← Anterior</button>
        <div class="pill" id="pageInfo">Página 1</div>
        <button class="btn btn-ghost" id="next" type="button">Siguiente →</button>
      </div>

      <div class="small" style="margin-top:10px;">
        ✏️ abre la página <b>www.html</b> para trabajar la auditoría.
      </div>
    </div>
  </div>

<script>
  const SUPABASE_URL = "https://xqlabhsjpqqpezvfsohd.supabase.co";
  const SUPABASE_KEY = "sb_publishable_BgF_8jI43XBSoBGSS6n8NA_qYXhyD8z";

  if (typeof window.sb === "undefined") {
    window.sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { persistSession:true, autoRefreshToken:true, detectSessionInUrl:true }
    });
  }

  if (typeof window.requireSession === "undefined") {
    window.requireSession = async ({ redirectTo } = {}) => {
      const { data, error } = await sb.auth.getSession();
      if (error) throw error;
      if (!data.session) {
        window.location.href = redirectTo || "../index.html";
        return null;
      }
      return data.session;
    };
  }

  if (typeof window.fetchProfile === "undefined") {
    window.fetchProfile = async (userId) => {
      const { data, error } = await sb
        .from("profiles")
        .select("id, full_name, role")
        .eq("id", userId)
        .single();
      if (error) throw error;
      return data;
    };
  }

  if (typeof window.signOut === "undefined") {
    window.signOut = async ({ redirectTo } = {}) => {
      await sb.auth.signOut();
      window.location.href = redirectTo || "../index.html";
    };
  }

  const $ = (id)=>document.getElementById(id);
  const tbody = $("tbody");
  const err = $("err");
  const count = $("count");
  const who = $("who");

  let page = 1;
  const pageSize = 20;

  let session = null;
  let profile = null;
  let isAdmin = false;

  const STATUS_LABEL = {
    open: "Abierta",
    in_progress: "En progreso",
    closed: "Cerrada",
  };

  function setErr(msg){ err.textContent = msg || ""; }

  function escapeHtml(s){
    return (s ?? "").toString()
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function fmtDate(d){
    if(!d) return "—";
    const x = new Date(d);
    if(Number.isNaN(x.getTime())) return "—";
    return x.toLocaleDateString();
  }

  async function checkIsAdmin(){
    const { data, error } = await sb
      .from("admins")
      .select("user_id")
      .eq("user_id", session.user.id)
      .maybeSingle();
    if(error) return false;
    return !!data;
  }

  function rowHtml(a){
    const userName = a?.created_by_profile?.full_name || "—";
    const title = a.title || "—";
    const status = a.status || "—";
    const statusText = STATUS_LABEL[status] || status;
    const fechas = `${fmtDate(a.start_date)} → ${fmtDate(a.end_date)}`;
    const creada = fmtDate(a.created_at);

    const manageBtn = isAdmin
      ? `<a class="btn btn-primary btn-mini" style="text-decoration:none;" href="./gestionar_auditoria.html?audit_id=${encodeURIComponent(a.id)}">Gestionar</a>`
      : "";

    return `
      <tr>
        <td>
          <b>${escapeHtml(title)}</b>
          <div class="muted">${escapeHtml(a.punto || "")}</div>
        </td>
        <td><span class="pill">${escapeHtml(statusText)}</span></td>
        <td>${escapeHtml(userName)}</td>
        <td>${escapeHtml(fechas)}</td>
        <td>${escapeHtml(creada)}</td>
        <td style="text-align:right;">
          <div class="cell-actions">
            <a
              class="btn btn-ghost btn-mini icon-btn"
              title="Abrir auditoría"
              href="./www.html?audit_id=${encodeURIComponent(a.id)}">✏️</a>
            ${manageBtn}
          </div>
        </td>
      </tr>
    `;
  }

  async function load(){
    setErr("");
    tbody.innerHTML = `<tr><td colspan="6" class="muted">Cargando...</td></tr>`;
    count.textContent = "—";

    const q = $("q").value.trim().toLowerCase();
    const from = (page - 1) * pageSize;
    const to = from + pageSize - 1;

    let query = sb
      .from("audits")
      .select(`
        id,title,punto,status,start_date,end_date,created_at,created_by,
        report_versions!inner(id),
        created_by_profile:profiles!audits_created_by_fkey(full_name)
      `, { count: "exact" })
      .order("created_at", { ascending:false })
      .range(from, to);

    const { data, error, count: total } = await query;

    if(error){
      tbody.innerHTML = `<tr><td colspan="6" class="muted">—</td></tr>`;
      setErr("No pude listar auditorías: " + error.message);
      return;
    }

    const rows = data || [];
    const filtered = !q ? rows : rows.filter(a => {
      const blob = `${a.title||""} ${a.punto||""} ${a.status||""} ${a?.created_by_profile?.full_name||""}`.toLowerCase();
      return blob.includes(q);
    });

    if(!filtered.length){
      tbody.innerHTML = `<tr><td colspan="6" class="muted">No hay auditorías con PDF.</td></tr>`;
    } else {
      tbody.innerHTML = filtered.map(rowHtml).join("");
    }

    count.textContent = (typeof total === "number")
      ? `${total} auditoría(s)`
      : `${filtered.length} auditoría(s)`;

    $("pageInfo").textContent = `Página ${page}`;
  }

  (async ()=>{
    try{
      session = await requireSession({ redirectTo: "../index.html" });
      if(!session) return;

      profile = await fetchProfile(session.user.id).catch(()=>null);
      isAdmin = await checkIsAdmin().catch(()=>false);

      const roleTxt = isAdmin ? "admin" : (profile?.role || "usuario");
      who.textContent = profile?.full_name
        ? `👤 ${profile.full_name} (${roleTxt})`
        : `👤 ${session.user.email} (${roleTxt})`;

      await load();
    }catch(e){
      setErr("Error inicializando: " + (e?.message || String(e)));
    }
  })();

  $("btnReload").onclick = ()=>{ page = 1; load(); };
  $("q").addEventListener("input", ()=>{ page = 1; load(); });

  $("prev").onclick = ()=>{ if(page > 1){ page--; load(); } };
  $("next").onclick = ()=>{ page++; load(); };

  $("btnLogout").onclick = ()=> signOut({ redirectTo: "../index.html" });
  $("btnBack").onclick = ()=> window.location.href = "./dashboard.html";
</script>
</body>
</html>
